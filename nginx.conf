server {
    listen 80;
    server_name amayanews.com www.amayanews.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name amayanews.com www.amayanews.com;

    ssl_certificate /etc/letsencrypt/live/amayanews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amayanews.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ⚠️ IMPORTANT : La location /uploads doit être AVANT la location /
    location /uploads {
        proxy_pass http://amaya-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api {
        proxy_pass http://amaya-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://amaya-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
